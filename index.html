<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guidance Prototypes</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      max-width: 720px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      line-height: 1.6;
      color: #1f2328;
      background: #ffffff;
    }
    h1 { font-size: 1.75rem; margin: 0 0 .25rem; letter-spacing: -0.01em; }
    p.lead { color: #6b7280; margin: 0 0 2.5rem; }
    h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: 0.06em; color: #6b7280; font-weight: 600; margin: 2rem 0 .5rem; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { padding: .9rem 0; border-bottom: 1px solid rgba(0,0,0,0.08); }
    li:last-child { border-bottom: none; }
    a.proto { color: #0969da; text-decoration: none; font-weight: 500; font-size: 1.05rem; }
    a.proto:hover { text-decoration: underline; }
    .desc { display: block; color: #6b7280; font-size: .9rem; font-weight: 400; margin-top: .15rem; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid rgba(0,0,0,0.08); font-size: .8rem; color: #6b7280; }
    footer a { color: inherit; }
    @media (prefers-color-scheme: dark) {
      body { background: #0d1117; color: #e6edf3; }
      p.lead, h2, .desc, footer { color: #8b949e; }
      a.proto { color: #58a6ff; }
      li, footer { border-color: rgba(255,255,255,0.1); }
    }
  </style>
</head>
<body>
  <h1>Guidance Prototypes</h1>
  <p class="lead">Static HTML prototypes for IBM Consumability work.</p>

  <h2>Prototypes</h2>
  <ul>
    <li>
      <a class="proto" href="pm-winning-strategies/">PM Winning Strategies</a>
      <span class="desc">Diagnostic guidance for PM overdue metrics in Maximo.</span>
    </li>
  </ul>

  <footer>
    Source: <a href="https://github.com/Sheeshcodes/IBM-Consumability---Prototypes">github.com/Sheeshcodes/IBM-Consumability---Prototypes</a>
  </footer>
</body>
</html>
